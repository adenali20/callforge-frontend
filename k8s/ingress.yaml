apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: callforge-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: callforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: callforge-service
                port:
                  number: 80